<section class="auth-card">
	<div class="auth-card__eyebrow">CodeSphere</div>
	<h1>Sign in</h1>
	<p>Access your doubts, answers, and profile from one place.</p>

	<form class="auth-form">
		<label>
			<span>Email</span>
			<input type="email" placeholder="you@example.com" />
		</label>

		<label>
			<span>Password</span>
			<input type="password" placeholder="••••••••" />
		</label>

		<button type="button">Sign in</button>
	</form>
</section>
